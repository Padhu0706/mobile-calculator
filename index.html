<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <div class="calculator-container">
      <div class="display">
        <div class="display-history" id="display-history"></div>
        <div class="display-main" id="display-main">0</div>
      </div>

      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-basic" data-mode="basic">Basic</button>
        <button class="mode-btn" id="mode-scientific" data-mode="scientific">Scientific</button>
      </div>

      <div class="keypad" id="keypad">
        <!-- Scientific row (hidden in basic mode) -->
        <div class="scientific-row" id="scientific-row">
          <button class="key key-sci" data-action="sin">sin</button>
          <button class="key key-sci" data-action="cos">cos</button>
          <button class="key key-sci" data-action="tan">tan</button>
          <button class="key key-sci" data-action="log">log</button>
          <button class="key key-sci" data-action="ln">ln</button>
          <button class="key key-sci" data-action="sqrt">√</button>
          <button class="key key-sci" data-action="pow">x^y</button>
          <button class="key key-sci" data-action="pi">π</button>
          <button class="key key-sci" data-action="e">e</button>
          <button class="key key-sci" data-action="fact">n!</button>
        </div>

        <!-- Main keypad -->
        <div class="keypad-grid">
          <button class="key key-fn" data-action="clear">AC</button>
          <button class="key key-fn" data-action="backspace">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
          </button>
          <button class="key key-fn" data-action="percent">%</button>
          <button class="key key-op" data-action="divide">÷</button>

          <button class="key" data-digit="7">7</button>
          <button class="key" data-digit="8">8</button>
          <button class="key" data-digit="9">9</button>
          <button class="key key-op" data-action="multiply">×</button>

          <button class="key" data-digit="4">4</button>
          <button class="key" data-digit="5">5</button>
          <button class="key" data-digit="6">6</button>
          <button class="key key-op" data-action="subtract">−</button>

          <button class="key" data-digit="1">1</button>
          <button class="key" data-digit="2">2</button>
          <button class="key" data-digit="3">3</button>
          <button class="key key-op" data-action="add">+</button>

          <button class="key" data-digit="0">0</button>
          <button class="key" data-action="decimal">.</button>
          <button class="key key-fn" data-action="negate">+/-</button>
          <button class="key key-eq" data-action="equals">=</button>
        </div>
      </div>

      <div class="history-panel" id="history-panel">
        <div class="history-header">
          <span>History</span>
          <button class="history-clear" id="history-clear">Clear</button>
        </div>
        <div class="history-list" id="history-list"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
